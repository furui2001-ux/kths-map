<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フロアマップ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      padding: 12px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    button {
      border: 1px solid #ccc;
      background: white;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button.active-floor {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }

    button.mode-on {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }

    button.manual-on {
      background: #d32f2f;
      color: white;
      border-color: #d32f2f;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.7;
      white-space: normal;
    }

    #adminWrap {
      max-width: 900px;
      margin: 12px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      display: none;
    }

    #adminWrap textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 13px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .admin-grid input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    #qrReaderWrap {
      max-width: 900px;
      margin: 12px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      display: none;
    }

    #qr-reader {
      width: 100%;
    }

    #mapWrap {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 16px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      touch-action: manipulation;
    }

    #mapImage {
      width: 100%;
      height: auto;
      display: block;
    }

    #accuracyCircle {
      position: absolute;
      border-radius: 50%;
      background: rgba(25, 118, 210, 0.15);
      border: 2px solid rgba(25, 118, 210, 0.35);
      transform: translate(-50%, -50%);
      left: 50px;
      top: 50px;
      z-index: 8;
      pointer-events: none;
      display: none;
    }

    #headingCone {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 55px solid rgba(30, 144, 255, 0.35);
      transform-origin: 50% calc(100% - 8px);
      left: 50px;
      top: 50px;
      margin-left: -18px;
      margin-top: -47px;
      z-index: 9;
      pointer-events: none;
      display: none;
    }

    #dot {
      position: absolute;
      width: 18px;
      height: 18px;
      background: red;
      border: 2px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(255,0,0,0.2);
      left: 50px;
      top: 50px;
      z-index: 10;
      pointer-events: none;
    }

    #dot.animate {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1); }
      50%  { transform: translate(-50%, -50%) scale(1.18); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    #label {
      position: absolute;
      transform: translate(-50%, calc(-100% - 10px));
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      left: 50px;
      top: 50px;
      z-index: 11;
      pointer-events: none;
    }

    .anchor-badge {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.9);
      border: 1px solid #666;
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 11px;
      z-index: 7;
      pointer-events: none;
    }

    .note {
      max-width: 900px;
      margin: 0 auto 20px auto;
      padding: 0 12px;
      font-size: 13px;
      color: #555;
      line-height: 1.7;
    }

    code {
      background: #eee;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="appTitle">フロアマップ</h1>

    <div class="controls" id="floorButtons"></div>

    <div class="controls">
      <button id="gpsBtn" onclick="toggleGPS()">GPS追従</button>
      <button id="qrBtn" onclick="toggleQR()">QR補正</button>
      <button id="manualBtn" onclick="toggleManualMode()">手動補正</button>
      <button id="adminBtn" onclick="toggleAdminPanel()" style="display:none;">管理者設定</button>
    </div>

    <div id="status">状態: 初期表示</div>
  </header>

  <div id="adminWrap">
    <h3 style="margin-top:0;">管理者設定</h3>

    <div class="admin-grid">
      <div>現在フロア</div>
      <div><strong id="adminCurrentFloor">1F</strong></div>

      <div>画像横幅（m）</div>
      <input id="widthMetersInput" type="number" step="0.1">

      <div>画像縦幅（m）</div>
      <input id="heightMetersInput" type="number" step="0.1">

      <div>地図の北方向（度）</div>
      <input id="mapNorthDegInput" type="number" step="1">
    </div>

    <div class="controls">
      <button onclick="saveFloorMeta()">このフロア設定を保存</button>
      <button onclick="clearCurrentFloorAnchors()">このフロアの補正点を削除</button>
      <button onclick="exportConfigToTextarea()">config.jsonを書き出し</button>
      <button onclick="copyConfigText()">JSONをコピー</button>
    </div>

    <div style="margin:10px 0;font-size:13px;line-height:1.7;color:#555;">
      管理者モードでは、手動補正またはQR補正で現在地を置くと、その場所を補正点として保存できます。<br>
      使い終わったら、下のJSONを <code>config.json</code> に反映してGitHubへ再アップロードしてください。
    </div>

    <textarea id="configOutput"></textarea>
  </div>

  <div id="qrReaderWrap">
    <div id="qr-reader"></div>
  </div>

  <div id="mapWrap">
    <img id="mapImage" src="" alt="フロアマップ" />
    <div id="accuracyCircle"></div>
    <div id="headingCone"></div>
    <div id="dot" class="animate"></div>
    <div id="label">現在地</div>
  </div>

  <div class="note">
    利用者モードでは QR補正 / GPS追従 / 向き表示 を使います。<br>
    管理者モードは URL の最後に <code>?admin=1</code> を付けたときだけ使えます。
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const mapWrap = document.getElementById("mapWrap");
    const mapImage = document.getElementById("mapImage");
    const dot = document.getElementById("dot");
    const label = document.getElementById("label");
    const accuracyCircle = document.getElementById("accuracyCircle");
    const headingCone = document.getElementById("headingCone");
    const statusEl = document.getElementById("status");
    const qrReaderWrap = document.getElementById("qrReaderWrap");
    const floorButtonsEl = document.getElementById("floorButtons");
    const adminWrap = document.getElementById("adminWrap");
    const appTitleEl = document.getElementById("appTitle");

    const gpsBtn = document.getElementById("gpsBtn");
    const qrBtn = document.getElementById("qrBtn");
    const manualBtn = document.getElementById("manualBtn");
    const adminBtn = document.getElementById("adminBtn");

    const adminCurrentFloor = document.getElementById("adminCurrentFloor");
    const widthMetersInput = document.getElementById("widthMetersInput");
    const heightMetersInput = document.getElementById("heightMetersInput");
    const mapNorthDegInput = document.getElementById("mapNorthDegInput");
    const configOutput = document.getElementById("configOutput");

    let config = null;
    let currentFloor = null;
    let watchId = null;
    let qrScanner = null;

    let gpsEnabled = false;
    let qrEnabled = false;
    let manualMode = false;
    let adminOpen = false;
    let headingEnabled = false;
    let isAdmin = false;

    let headingDeg = null;
    let lastAccuracyMeters = 0;
    let ignoreGpsUntil = 0;

    let currentPosition = {
      floor: null,
      nx: 0.5,
      ny: 0.5,
      label: "現在地"
    };

    let anchor = {
      enabled: false,
      floor: null,
      baseLat: null,
      baseLon: null,
      baseNx: 0.5,
      baseNy: 0.5,
      label: ""
    };

    function updateStatus(html) {
      statusEl.innerHTML = html;
    }

    function floorOrder() {
      return Object.keys(config.floors);
    }

    function updateModeButtons() {
      gpsBtn.classList.toggle("mode-on", gpsEnabled);
      qrBtn.classList.toggle("mode-on", qrEnabled);
      manualBtn.classList.toggle("manual-on", manualMode);
      adminBtn.classList.toggle("mode-on", adminOpen);

      gpsBtn.textContent = gpsEnabled ? "GPS追従中" : "GPS追従";
      qrBtn.textContent = qrEnabled ? "QR読取中" : "QR補正";
      manualBtn.textContent = manualMode ? "手動補正中" : "手動補正";
      adminBtn.textContent = adminOpen ? "管理者設定中" : "管理者設定";
    }

    function buildFloorButtons() {
      floorButtonsEl.innerHTML = "";
      floorOrder().forEach(floor => {
        const btn = document.createElement("button");
        btn.id = "btn" + floor;
        btn.textContent = floor;
        btn.onclick = () => switchFloor(floor);
        floorButtonsEl.appendChild(btn);
      });
      updateFloorButtons();
    }

    function updateFloorButtons() {
      floorOrder().forEach(floor => {
        const btn = document.getElementById("btn" + floor);
        if (btn) btn.classList.toggle("active-floor", currentFloor === floor);
      });
    }

    function getFloorConfig(floor) {
      return config.floors[floor];
    }

    function setMapImageForFloor(floor) {
      const f = getFloorConfig(floor);
      mapImage.src = f.image;
    }

    function renderAnchors() {
      document.querySelectorAll(".anchor-badge").forEach(el => el.remove());
      const floor = currentFloor;
      const anchors = getFloorConfig(floor).anchors || [];

      anchors.forEach(a => {
        const el = document.createElement("div");
        el.className = "anchor-badge";
        el.textContent = a.label;

        const x = a.nx * mapImage.clientWidth;
        const y = a.ny * mapImage.clientHeight;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;

        mapWrap.appendChild(el);
      });
    }

    function renderAccuracyCircle() {
      const width = mapImage.clientWidth;
      const height = mapImage.clientHeight;
      const x = currentPosition.nx * width;
      const y = currentPosition.ny * height;

      accuracyCircle.style.left = x + "px";
      accuracyCircle.style.top = y + "px";

      const circlePx = Math.max(20, Math.min(180, lastAccuracyMeters * 2));
      accuracyCircle.style.width = circlePx + "px";
      accuracyCircle.style.height = circlePx + "px";
      accuracyCircle.style.display = gpsEnabled ? "block" : "none";
    }

    function renderHeading() {
      const width = mapImage.clientWidth;
      const height = mapImage.clientHeight;
      const x = currentPosition.nx * width;
      const y = currentPosition.ny * height;

      headingCone.style.left = x + "px";
      headingCone.style.top = y + "px";

      if (headingDeg === null) {
        headingCone.style.display = "none";
        return;
      }

      const mapNorthDeg = getFloorConfig(currentFloor).mapNorthDeg || 0;
      const displayHeading = headingDeg - mapNorthDeg;

      headingCone.style.display = "block";
      headingCone.style.transform = `rotate(${displayHeading}deg)`;
    }

    function renderPosition() {
      const width = mapImage.clientWidth;
      const height = mapImage.clientHeight;

      const x = currentPosition.nx * width;
      const y = currentPosition.ny * height;

      dot.style.left = x + "px";
      dot.style.top = y + "px";
      label.style.left = x + "px";
      label.style.top = y + "px";
      label.textContent = currentPosition.label || "現在地";

      renderAccuracyCircle();
      renderHeading();
      renderAnchors();
    }

    function setNormalizedPosition(floor, nx, ny, text = "現在地") {
      currentFloor = floor;
      currentPosition = {
        floor,
        nx: Math.max(0, Math.min(1, Number(nx))),
        ny: Math.max(0, Math.min(1, Number(ny))),
        label: text
      };
      updateFloorButtons();
      renderPosition();
      updateAdminFields();
    }

    function switchFloor(floor) {
      currentFloor = floor;
      currentPosition.floor = floor;
      setMapImageForFloor(floor);
      updateFloorButtons();
      updateAdminFields();

      mapImage.onload = () => {
        renderPosition();
        updateStatus(`状態: ${floor}を表示中`);
      };
    }

    function updateAdminFields() {
      if (!config || !currentFloor) return;
      adminCurrentFloor.textContent = currentFloor;
      const f = getFloorConfig(currentFloor);
      widthMetersInput.value = f.widthMeters;
      heightMetersInput.value = f.heightMeters;
      mapNorthDegInput.value = f.mapNorthDeg;
    }

    function saveFloorMeta() {
      const f = getFloorConfig(currentFloor);
      f.widthMeters = Number(widthMetersInput.value);
      f.heightMeters = Number(heightMetersInput.value);
      f.mapNorthDeg = Number(mapNorthDegInput.value);

      updateStatus(
        `状態: ${currentFloor} の設定を保存<br>` +
        `width=${f.widthMeters}m, height=${f.heightMeters}m, north=${f.mapNorthDeg}°`
      );
    }

    function clearCurrentFloorAnchors() {
      getFloorConfig(currentFloor).anchors = [];
      renderAnchors();
      updateStatus(`状態: ${currentFloor} の補正点を削除しました`);
    }

    function exportConfigToTextarea() {
      configOutput.value = JSON.stringify(config, null, 2);
      updateStatus("状態: config.json を書き出しました");
    }

    async function copyConfigText() {
      exportConfigToTextarea();
      try {
        await navigator.clipboard.writeText(configOutput.value);
        updateStatus("状態: config.json をコピーしました");
      } catch (e) {
        updateStatus("状態: コピーに失敗しました");
      }
    }

    function addAdminAnchor(labelText, nx, ny) {
      const anchors = getFloorConfig(currentFloor).anchors || [];
      anchors.push({
        label: labelText,
        nx: Number(nx.toFixed(6)),
        ny: Number(ny.toFixed(6))
      });
      getFloorConfig(currentFloor).anchors = anchors;
      renderAnchors();
      exportConfigToTextarea();
    }

    function enableAnchor(nx, ny, labelText, lat, lon) {
      anchor.enabled = true;
      anchor.floor = currentFloor;
      anchor.baseNx = Number(nx);
      anchor.baseNy = Number(ny);
      anchor.baseLat = lat;
      anchor.baseLon = lon;
      anchor.label = labelText;

      setNormalizedPosition(currentFloor, nx, ny, labelText);

      if (isAdmin) {
        addAdminAnchor(labelText, Number(nx), Number(ny));
      }
    }

    function toggleManualMode() {
      manualMode = !manualMode;
      updateModeButtons();

      if (manualMode) {
        updateStatus(`状態: 手動補正モードON<br>地図をタップすると現在地を置きます`);
      } else {
        updateStatus(`状態: 手動補正モードOFF`);
      }
    }

    mapWrap.addEventListener("click", async function(event) {
      if (!manualMode) return;

      const rect = mapImage.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const clickY = event.clientY - rect.top;

      const nx = clickX / rect.width;
      const ny = clickY / rect.height;

      try {
        const pos = await getOnePosition();
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        lastAccuracyMeters = pos.coords.accuracy || 0;

        enableAnchor(nx, ny, "手動補正位置", lat, lon);
        ignoreGpsUntil = Date.now() + 3000;

        updateStatus(
          `状態: 手動補正完了<br>` +
          `階: ${currentFloor}<br>` +
          `基準GPS: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>` +
          `基準位置: nx=${nx.toFixed(6)}, ny=${ny.toFixed(6)}<br>` +
          `3秒間GPS無視中`
        );
      } catch (e) {
        setNormalizedPosition(currentFloor, nx, ny, "手動補正位置");
        updateStatus(
          `状態: 手動補正完了（GPS基準なし）<br>` +
          `階: ${currentFloor}<br>` +
          `nx=${nx.toFixed(6)}, ny=${ny.toFixed(6)}`
        );
      }
    });

    function toggleGPS() {
      if (gpsEnabled) {
        stopGPSInternal();
      } else {
        startGPSInternal();
      }
      updateModeButtons();
    }

    function stopGPSInternal() {
      gpsEnabled = false;
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      accuracyCircle.style.display = "none";
      updateStatus("状態: GPS追従停止");
    }

    async function startHeading() {
      if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
      ) {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== "granted") {
            updateStatus("状態: 方位センサーの許可が拒否されました");
            return;
          }
        } catch (e) {
          updateStatus("状態: 方位センサーの許可取得に失敗しました");
          return;
        }
      }

      window.addEventListener("deviceorientation", handleOrientation, true);
      headingEnabled = true;
    }

    function handleOrientation(event) {
      if (typeof event.webkitCompassHeading === "number") {
        headingDeg = event.webkitCompassHeading;
      } else if (event.alpha != null) {
        headingDeg = 360 - event.alpha;
      }

      if (headingDeg != null) renderHeading();
    }

    function startGPSInternal() {
      if (!navigator.geolocation) {
        updateStatus("状態: この端末では位置情報が使えません");
        return;
      }

      if (!headingEnabled) startHeading();

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }

      gpsEnabled = true;
      updateModeButtons();
      updateStatus("状態: GPS追従開始");

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          if (Date.now() < ignoreGpsUntil) {
            const remain = ((ignoreGpsUntil - Date.now()) / 1000).toFixed(1);
            updateStatus(`状態: 補正直後のためGPS一時停止中<br>残り約${remain}秒`);
            return;
          }

          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const acc = pos.coords.accuracy;
          lastAccuracyMeters = acc || 0;

          if (!anchor.enabled || anchor.baseLat == null || anchor.baseLon == null) {
            updateStatus(
              `状態: GPS追従中（アンカー未設定）<br>` +
              `まずQR補正または手動補正で現在地を置いてください<br>` +
              `緯度: ${lat.toFixed(6)} / 経度: ${lon.toFixed(6)}<br>` +
              `精度: 約${Math.round(acc)}m`
            );
            renderPosition();
            return;
          }

          const metersPerDegLat = 111320;
          const meanLatRad = ((anchor.baseLat + lat) / 2) * Math.PI / 180;
          const metersPerDegLon = 111320 * Math.cos(meanLatRad);

          const eastMeters = (lon - anchor.baseLon) * metersPerDegLon;
          const northMeters = (lat - anchor.baseLat) * metersPerDegLat;

          const floorMeta = getFloorConfig(anchor.floor);
          const theta = (floorMeta.mapNorthDeg || 0) * Math.PI / 180;

          const dxMapMeters = eastMeters * Math.cos(theta) - northMeters * Math.sin(theta);
          const dyMapMeters = -(eastMeters * Math.sin(theta) + northMeters * Math.cos(theta));

          const dNx = dxMapMeters / floorMeta.widthMeters;
          const dNy = dyMapMeters / floorMeta.heightMeters;

          const rawNx = anchor.baseNx + dNx;
          const rawNy = anchor.baseNy + dNy;

          const nx = Math.max(0, Math.min(1, rawNx));
          const ny = Math.max(0, Math.min(1, rawNy));

          currentFloor = anchor.floor;
          currentPosition = {
            floor: anchor.floor,
            nx,
            ny,
            label: "GPS現在地"
          };

          if (!mapImage.src.includes(getFloorConfig(currentFloor).image)) {
            setMapImageForFloor(currentFloor);
          }

          renderPosition();
          updateFloorButtons();

          let warning = "";
          if (rawNx < 0 || rawNx > 1 || rawNy < 0 || rawNy > 1) {
            warning = "<br>※現在地が画像範囲外です";
          }

          updateStatus(
            `状態: GPS追従中（相対移動）<br>` +
            `階: ${currentFloor}<br>` +
            `現在GPS: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>` +
            `基準GPS: ${anchor.baseLat.toFixed(6)}, ${anchor.baseLon.toFixed(6)}<br>` +
            `精度: 約${Math.round(acc)}m<br>` +
            `東西移動: ${eastMeters.toFixed(2)}m / 南北移動: ${northMeters.toFixed(2)}m<br>` +
            `rawNx=${rawNx.toFixed(6)}, rawNy=${rawNy.toFixed(6)}<br>` +
            `nx=${nx.toFixed(6)}, ny=${ny.toFixed(6)}`
            + warning
          );
        },
        (err) => {
          let msg = "位置取得失敗";
          if (err.code === 1) msg = "位置情報の許可が拒否されました";
          if (err.code === 2) msg = "位置情報を取得できませんでした";
          if (err.code === 3) msg = "位置取得がタイムアウトしました";
          updateStatus(`状態: ${msg}`);
        },
        {
          enableHighAccuracy: true,
          timeout: 30000,
          maximumAge: 1000
        }
      );
    }

    function getNextFloor(current) {
      const floors = floorOrder();
      const idx = floors.indexOf(current);
      return idx >= 0 && idx < floors.length - 1 ? floors[idx + 1] : current;
    }

    function getPrevFloor(current) {
      const floors = floorOrder();
      const idx = floors.indexOf(current);
      return idx > 0 ? floors[idx - 1] : current;
    }

    async function applyQrAnchor(floor, nx, ny, text = "QR補正位置") {
      currentFloor = floor;

      try {
        const pos = await getOnePosition();
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        lastAccuracyMeters = pos.coords.accuracy || 0;

        setMapImageForFloor(currentFloor);
        updateFloorButtons();

        mapImage.onload = () => {
          enableAnchor(nx, ny, text, lat, lon);
          ignoreGpsUntil = Date.now() + 3000;

          updateStatus(
            `状態: QR補正完了<br>` +
            `階: ${currentFloor}<br>` +
            `基準GPS: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>` +
            `基準位置: nx=${Number(nx).toFixed(6)}, ny=${Number(ny).toFixed(6)}<br>` +
            `ラベル: ${text}<br>` +
            `3秒間GPS無視中`
          );
        };
      } catch (e) {
        enableAnchor(nx, ny, text, null, null);
        updateStatus(
          `状態: QR補正完了（GPS基準なし）<br>` +
          `階: ${currentFloor}<br>` +
          `nx=${Number(nx).toFixed(6)}, ny=${Number(ny).toFixed(6)}<br>` +
          `ラベル: ${text}`
        );
      }
    }

    async function applyStairsMode(mode, nx, ny, text = "階段") {
      let nextFloor = currentFloor;
      if (mode === "stairs-up") nextFloor = getNextFloor(currentFloor);
      if (mode === "stairs-down") nextFloor = getPrevFloor(currentFloor);
      currentFloor = nextFloor;
      await applyQrAnchor(currentFloor, nx, ny, text);
    }

    function parseQrText(decodedText) {
      try {
        let params;

        if (decodedText.startsWith("http://") || decodedText.startsWith("https://")) {
          const url = new URL(decodedText);
          params = url.searchParams;
        } else {
          params = new URLSearchParams(decodedText);
        }

        const mode = params.get("mode");
        const floor = params.get("floor");
        const nx = params.get("nx");
        const ny = params.get("ny");
        const text = params.get("label") || "QR補正位置";

        if (nx === null || ny === null) {
          updateStatus("状態: QRの形式が正しくありません");
          return;
        }

        if (mode === "stairs-up" || mode === "stairs-down") {
          applyStairsMode(mode, Number(nx), Number(ny), text);
        } else {
          applyQrAnchor(floor || currentFloor, Number(nx), Number(ny), text);
        }
      } catch (e) {
        updateStatus("状態: QRの解析に失敗しました");
      }
    }

    async function toggleQR() {
      if (qrEnabled) {
        await stopQrScanInternal();
      } else {
        await startQrScanInternal();
      }
      updateModeButtons();
    }

    async function startQrScanInternal() {
      try {
        qrReaderWrap.style.display = "block";

        if (!qrScanner) qrScanner = new Html5Qrcode("qr-reader");

        await qrScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => parseQrText(decodedText),
          () => {}
        );

        qrEnabled = true;
        updateModeButtons();
        updateStatus("状態: QR読み取り中...");
      } catch (e) {
        qrEnabled = false;
        updateModeButtons();
        updateStatus("状態: カメラ起動に失敗しました");
      }
    }

    async function stopQrScanInternal() {
      try {
        if (qrScanner && qrScanner.isScanning) {
          await qrScanner.stop();
          await qrScanner.clear();
          qrScanner = null;
        }
      } catch (e) {}
      qrReaderWrap.style.display = "none";
      qrEnabled = false;
      updateModeButtons();
      updateStatus("状態: QR停止");
    }

    function toggleAdminPanel() {
      if (!isAdmin) return;
      adminOpen = !adminOpen;
      adminWrap.style.display = adminOpen ? "block" : "none";
      updateModeButtons();
      if (adminOpen) {
        updateAdminFields();
        exportConfigToTextarea();
        updateStatus(`状態: 管理者設定を表示中<br>フロア: ${currentFloor}`);
      } else {
        updateStatus("状態: 管理者設定を閉じました");
      }
    }

    function getOnePosition() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 30000,
          maximumAge: 0
        });
      });
    }

    async function loadConfig() {
      const res = await fetch("./config.json", { cache: "no-store" });
      if (!res.ok) throw new Error("config.json を読み込めません");
      config = await res.json();
      appTitleEl.textContent = config.appTitle || "フロアマップ";
    }

    function applyQuery() {
      const params = new URLSearchParams(window.location.search);
      isAdmin = params.get("admin") === "1";

      if (isAdmin) {
        adminBtn.style.display = "inline-block";
      }

      const floors = floorOrder();
      currentFloor = floors[0];

      const floor = params.get("floor");
      const nx = params.get("nx");
      const ny = params.get("ny");
      const text = params.get("label");

      if (floor && config.floors[floor]) {
        currentFloor = floor;
      }

      setMapImageForFloor(currentFloor);
      updateFloorButtons();
      updateModeButtons();
      updateAdminFields();

      mapImage.onload = () => {
        if (nx !== null && ny !== null) {
          setNormalizedPosition(currentFloor, nx, ny, text || "URL位置");
          updateStatus(
            `状態: URL位置を表示中<br>` +
            `階: ${currentFloor}<br>` +
            `nx=${Number(nx).toFixed(6)}, ny=${Number(ny).toFixed(6)}`
          );
        } else {
          setNormalizedPosition(currentFloor, 0.5, 0.5, "現在地");
          updateStatus(`状態: ${currentFloor}を表示中`);
        }
      };
    }

    window.addEventListener("resize", () => {
      renderPosition();
    });

    window.addEventListener("load", async () => {
      try {
        await loadConfig();
        buildFloorButtons();
        applyQuery();
      } catch (e) {
        updateStatus("状態: config.json の読み込みに失敗しました");
      }
    });
  </script>
</body>
</html>
